query SearchQuery($search: String, $perPage: Int) {
    Page(page: 0, perPage: $perPage) {
        media(type: ANIME, search: $search, format_not_in: [MUSIC, MANGA, NOVEL, ONE_SHOT]) {
            title {
                native
                english
            }
            description
            format
            episodes
            season
            seasonYear
            startDate {
                year
                month
                day
            }
            endDate {
                year
                month
                day
            }
            status
            synonyms
            genres
            tags {
                name
            }
            coverImage {
                large
                medium
                color
            }
            siteUrl
        }
    }
}